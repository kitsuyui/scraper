name: golang-test

on:
  # pull-request events are not triggered when a PR is merged
  # push events are not triggered when a PR created from a fork repository
  # So we need both to run tests on every PR and after merging
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: setup
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      - name: install dependencies
        run: go install

      - name: lint
        run: |
          go vet ./...
          go mod tidy

      - name: test
        run: go test -v -cover -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: coverage.out
          retention-days: 1

  report-coverage:
    name: report-coverage
    runs-on: ubuntu-latest
    needs: [test]
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: download coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: .

      - name: Report coverage with octocov
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: .octocov.yml
